<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prediction Result</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h1 class="h4 mb-3">Prediction Result</h1>
              <p class="mb-2"><strong>Predicted leftover:</strong> {{ prediction }} kg</p>
              <p class="mb-2"><strong>Waste risk:</strong> {{ risk }}</p>
              <p class="mb-4"><strong>Recommendation:</strong> {{ recommendation }}</p>
              <a class="btn btn-outline-primary" href="/">Make another prediction</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
