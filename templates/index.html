<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Waste Prediction</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-7">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h1 class="h4 mb-3">Food Waste Prediction</h1>
              <p class="text-muted mb-4">
                Enter meal details to estimate leftover food and waste risk.
              </p>
              <form method="post">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label">Meal type</label>
                    <select class="form-select" name="meal_type" required>
                      <option value="breakfast">Breakfast</option>
                      <option value="lunch">Lunch</option>
                      <option value="dinner">Dinner</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Weather</label>
                    <select class="form-select" name="weather" required>
                      <option value="sunny">Sunny</option>
                      <option value="cloudy">Cloudy</option>
                      <option value="rainy">Rainy</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Menu type</label>
                    <select class="form-select" name="menu_type" required>
                      <option value="standard">Standard</option>
                      <option value="vegetarian">Vegetarian</option>
                      <option value="premium">Premium</option>
                      <option value="seasonal">Seasonal</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Food category</label>
                    <select class="form-select" name="food_category" required>
                      <option value="grains">Grains</option>
                      <option value="vegetables">Vegetables</option>
                      <option value="meat">Meat</option>
                      <option value="dairy">Dairy</option>
                      <option value="mixed">Mixed</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Is holiday?</label>
                    <select class="form-select" name="is_holiday" required>
                      <option value="0">No</option>
                      <option value="1">Yes</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Special event?</label>
                    <select class="form-select" name="special_event" required>
                      <option value="0">No</option>
                      <option value="1">Yes</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Expected people</label>
                    <input
                      type="number"
                      class="form-control"
                      name="expected_people"
                      min="1"
                      step="1"
                      required
                    />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Actual people</label>
                    <input
                      type="number"
                      class="form-control"
                      name="actual_people"
                      min="1"
                      step="1"
                      required
                    />
                  </div>
                  <div class="col-md-12">
                    <label class="form-label">Quantity prepared (kg)</label>
                    <input
                      type="number"
                      class="form-control"
                      name="quantity_prepared_kg"
                      min="0"
                      step="0.1"
                      required
                    />
                  </div>
                </div>
                <div class="d-grid mt-4">
                  <button class="btn btn-primary" type="submit">Predict</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
