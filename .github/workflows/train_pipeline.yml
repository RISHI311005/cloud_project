name: Train Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Run ETL (S3)
        env:
          USE_S3: "true"
          S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
          S3_RAW_KEY: "raw/food_waste_dataset.csv"
          S3_PROCESSED_KEY: "processed/cleaned_data.csv"
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          echo "Starting ETL..."
          python src/etl.py
          echo "ETL complete."

      - name: Train model (S3)
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
          S3_PROCESSED_KEY: "processed/cleaned_data.csv"
          S3_MODEL_KEY: "models/model.pkl"
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          echo "Starting training..."
          python src/train_from_s3.py
          echo "Training complete."

      - name: Verify model created locally
        run: |
          echo "Checking for model/model.pkl..."
          test -f model/model.pkl
          echo "Model found."
