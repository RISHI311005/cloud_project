name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Deploy via SSM
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          set -e
          if [ -z "${EC2_INSTANCE_ID}" ]; then
            echo "EC2_INSTANCE_ID secret is required." >&2
            exit 1
          fi
          if [ -z "${EC2_APP_DIR}" ]; then
            echo "EC2_APP_DIR secret is required." >&2
            exit 1
          fi
          if [ -z "${S3_BUCKET_NAME}" ]; then
            echo "S3_BUCKET_NAME secret is required." >&2
            exit 1
          fi
          if [ -z "${AWS_DEFAULT_REGION}" ]; then
            echo "AWS_DEFAULT_REGION secret is required." >&2
            exit 1
          fi
          cat > /tmp/ssm-commands.json <<'EOF'
          {
            "commands": [
              "cd ${EC2_APP_DIR}",
              "export USE_S3=true",
              "export S3_BUCKET=${S3_BUCKET_NAME}",
              "export AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}",
              "git pull",
              "if [ -f .venv/bin/activate ]; then . .venv/bin/activate; fi",
              "python -m pip install --upgrade pip",
              "if [ -f requirements.txt ]; then pip install -r requirements.txt; fi",
              "pkill -f 'python src/app.py' || true",
              "nohup python src/app.py > app.log 2>&1 &"
            ]
          }
          EOF
          aws ssm send-command \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --parameters file:///tmp/ssm-commands.json \
            --comment "Deploy cloud_project from GitHub Actions"
